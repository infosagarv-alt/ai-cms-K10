<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Content Studio - Advanced K-12 CMS">
    <title>AI Content Studio Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #e9ecef;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border: #dee2e6;
            --radius: 8px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a1a;
                --bg-secondary: #2a2a2a;
                --bg-tertiary: #333333;
                --text-primary: #ffffff;
                --text-secondary: #cccccc;
                --border: #444444;
            }
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        body {
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: var(--bg-primary);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem;
            overflow-y: auto;
        }

        .sidebar h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .page-btn {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border: 0.5px solid transparent;
            background-color: transparent;
            color: var(--text-primary);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .page-btn:hover {
            background-color: var(--bg-secondary);
        }

        .page-btn.active {
            background-color: var(--primary);
            color: white;
            font-weight: 500;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 1rem 1.5rem;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h2 {
            font-size: 18px;
            font-weight: 500;
            margin: 0 0 0.25rem 0;
        }

        .header-left p {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0;
        }

        .header-right {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: 0.5px solid var(--border);
            border-radius: var(--radius);
            background-color: transparent;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--bg-secondary);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 12px;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            background-color: var(--bg-primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 0.75rem;
            text-align: left;
            font-weight: 500;
            white-space: nowrap;
            border-right: 0.5px solid var(--border);
            position: relative;
        }

        th .col-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        th .col-menu {
            cursor: pointer;
            font-size: 16px;
            opacity: 0.5;
        }

        th .col-menu:hover {
            opacity: 1;
        }

        td {
            padding: 0.75rem;
            border-bottom: 0.5px solid var(--border);
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 150px;
        }

        tr:hover td {
            background-color: var(--bg-secondary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background-color: var(--bg-primary);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h1 {
            font-size: 24px;
            margin-bottom: 0.5rem;
        }

        .modal p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 0.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 13px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .panel {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 500px;
            background-color: var(--bg-primary);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            z-index: 999;
            box-shadow: -2px 0 12px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .panel-content {
            padding: 1.5rem;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        .field-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .ai-section {
            background-color: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius);
            border: 0.5px solid var(--border);
        }

        .ai-result {
            background-color: var(--bg-primary);
            border: 0.5px solid var(--border);
            padding: 0.75rem;
            border-radius: var(--radius);
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .panel-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }

        .panel-footer button {
            flex: 1;
            padding: 0.75rem;
            border: 0.5px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--bg-primary);
            cursor: pointer;
            font-weight: 500;
        }

        .panel-footer .btn-primary {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .error-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: var(--danger);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .col-menu-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
            min-width: 150px;
        }

        .col-menu-dropdown button {
            width: 100%;
            padding: 0.5rem 1rem;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
        }

        .col-menu-dropdown button:hover {
            background-color: var(--bg-secondary);
        }

        .options-input {
            font-size: 12px;
            line-height: 1.5;
        }

        .spin {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const AI_MODELS = {
            anthropic: [
                { id: 'claude-3-5-sonnet', label: 'Sonnet 3.5' },
                { id: 'claude-3-opus', label: 'Opus 3' }
            ],
            openai: [
                { id: 'gpt-4', label: 'GPT-4' },
                { id: 'gpt-3.5-turbo', label: 'GPT-3.5 Turbo' }
            ],
            google: [
                { id: 'gemini-pro', label: 'Gemini Pro' }
            ],
            deepseek: [
                { id: 'deepseek-v3', label: 'DeepSeek V3' }
            ]
        };

        const FIELD_TYPES = {
            'text-short': { label: 'Short Text', icon: 'A' },
            'text-long': { label: 'Long Text', icon: '¶' },
            'select-single': { label: 'Single Select', icon: '▼' },
            'ai-field': { label: 'AI Field', icon: '✨' },
            'date': { label: 'Date', icon: '📅' },
            'number': { label: 'Number', icon: '#' }
        };

        class CMS {
            constructor() {
                this.user = null;
                this.pages = {};
                this.currentPage = null;
                this.expandedCell = null;
                this.error = null;
                this.sessionSeconds = 24 * 60 * 60;
                this.db = null;
                this.init();
            }

            async init() {
                await this.initDB();
                this.loadSession();
                this.loadPages();
                this.startSessionTimer();
                this.render();
            }

            async initDB() {
                return new Promise((resolve) => {
                    const request = indexedDB.open('aiCMS', 1);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('workspace')) {
                            db.createObjectStore('workspace', { keyPath: 'id' });
                        }
                    };
                });
            }

            async saveData(key, data) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction('workspace', 'readwrite');
                    const store = tx.objectStore('workspace');
                    store.put({ id: key, data, timestamp: Date.now() });
                    tx.oncomplete = () => resolve();
                });
            }

            async loadData(key) {
                return new Promise((resolve) => {
                    const tx = this.db.transaction('workspace', 'readonly');
                    const store = tx.objectStore('workspace');
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result?.data);
                });
            }

            loadSession() {
                const stored = localStorage.getItem('cms_session');
                if (stored) {
                    const session = JSON.parse(stored);
                    const elapsed = Date.now() - session.createdAt;
                    const remaining = (24 * 60 * 60 * 1000) - elapsed;
                    
                    if (remaining > 0) {
                        this.user = session.user;
                        this.sessionSeconds = Math.floor(remaining / 1000);
                    } else {
                        this.logoutSession();
                    }
                }
            }

            startSessionTimer() {
                setInterval(() => {
                    if (this.user) {
                        this.sessionSeconds--;
                        if (this.sessionSeconds <= 0) {
                            this.logoutSession();
                            this.error = 'Session expired. Please log in again.';
                        }
                        this.render();
                    }
                }, 1000);
            }

            logoutSession() {
                this.user = null;
                localStorage.removeItem('cms_session');
                this.sessionSeconds = 24 * 60 * 60;
            }

            loadPages() {
                const stored = localStorage.getItem('cms_pages');
                if (stored) {
                    this.pages = JSON.parse(stored);
                } else {
                    this.pages = {
                        textbook: { name: 'Textbook', columns: [], rows: [] },
                        questions: { name: 'Questions', columns: [], rows: [] },
                        'lesson-plans': { name: 'Lesson Plans', columns: [], rows: [] }
                    };
                    this.savePagesData();
                }
                if (!this.currentPage) {
                    this.currentPage = Object.keys(this.pages)[0];
                }
            }

            savePagesData() {
                localStorage.setItem('cms_pages', JSON.stringify(this.pages));
            }

            handleLogin(email, name, apiKeys) {
                this.user = { email, name, apiKeys };
                localStorage.setItem('cms_session', JSON.stringify({
                    user: this.user,
                    createdAt: Date.now()
                }));
                this.sessionSeconds = 24 * 60 * 60;
                this.error = null;
                this.render();
            }

            addColumn(pageName, columnName, fieldType) {
                const col = {
                    id: `col-${Date.now()}`,
                    name: columnName,
                    type: fieldType,
                    options: fieldType === 'select-single' ? [] : null
                };
                this.pages[pageName].columns.push(col);
                this.savePagesData();
                this.render();
            }

            deleteColumn(pageName, colId) {
                this.pages[pageName].columns = this.pages[pageName].columns.filter(c => c.id !== colId);
                this.savePagesData();
                this.render();
            }

            addRow(pageName) {
                const newRow = {
                    id: `row-${Date.now()}`,
                    cells: {},
                    createdBy: this.user.email,
                    createdAt: new Date().toISOString()
                };
                this.pages[pageName].columns.forEach(col => {
                    newRow.cells[col.id] = '';
                });
                this.pages[pageName].rows.push(newRow);
                this.savePagesData();
                this.render();
            }

            deleteRow(pageName, rowId) {
                this.pages[pageName].rows = this.pages[pageName].rows.filter(r => r.id !== rowId);
                this.savePagesData();
                this.render();
            }

            updateCell(pageName, rowId, colId, value) {
                const row = this.pages[pageName].rows.find(r => r.id === rowId);
                if (row) {
                    row.cells[colId] = value;
                    this.savePagesData();
                }
            }

            formatTime(seconds) {
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                return `${hours}h ${mins}m`;
            }

            render() {
                const app = document.getElementById('app');
                
                if (!this.user) {
                    app.innerHTML = this.renderLogin();
                    this.attachLoginHandlers();
                } else {
                    app.innerHTML = this.renderApp();
                    this.attachAppHandlers();
                }
            }

            renderLogin() {
                return `
                    <div class="modal-overlay">
                        <div class="modal">
                            <h1>AI Content Studio Pro</h1>
                            <p>Advanced K-12 content management system with full Lark Base features.</p>
                            
                            ${this.error ? `<div style="padding: 0.75rem; background-color: var(--danger); color: white; border-radius: var(--radius); margin-bottom: 1rem; font-size: 13px;">${this.error}</div>` : ''}
                            
                            <form id="loginForm">
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="email" placeholder="you@school.edu" required>
                                </div>
                                
                                <div class="form-group">
                                    <label>Name</label>
                                    <input type="text" id="name" placeholder="Your name" required>
                                </div>

                                <div class="form-group">
                                    <label>
                                        <input type="checkbox" id="showApiKeys"> Add API Keys (Optional)
                                    </label>
                                </div>

                                <div id="apiKeysSection" style="display: none;">
                                    ${Object.keys(AI_MODELS).map(provider => `
                                        <div class="form-group">
                                            <label>${provider.charAt(0).toUpperCase() + provider.slice(1)} API Key</label>
                                            <input type="password" class="api-key-input" data-provider="${provider}" placeholder="Enter ${provider} API key (optional)">
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Start Session</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            renderApp() {
                const page = this.pages[this.currentPage];
                
                return `
                    ${this.error ? `<div class="error-banner"><span>${this.error}</span><button class="close-btn" style="border: none; background: none; color: white; cursor: pointer;">✕</button></div>` : ''}
                    
                    <div class="app-container">
                        <div class="sidebar">
                            <h3>Pages</h3>
                            ${Object.entries(this.pages).map(([key, p]) => `
                                <button class="page-btn ${this.currentPage === key ? 'active' : ''}" data-page="${key}">
                                    ${p.name}
                                </button>
                            `).join('')}
                        </div>

                        <div class="main-content">
                            <div class="header">
                                <div class="header-left">
                                    <h2>${page.name}</h2>
                                    <p>${this.user.email} • ${this.formatTime(this.sessionSeconds)} remaining • ${page.columns.length} columns</p>
                                </div>
                                <div class="header-right">
                                    <button class="btn btn-primary btn-sm" id="addColBtn">+ Column</button>
                                    <button class="btn btn-primary btn-sm" id="addRowBtn">+ Row</button>
                                    <button class="btn btn-sm" id="exportBtn">Export</button>
                                    <button class="btn btn-sm" id="logoutBtn">Logout</button>
                                </div>
                            </div>

                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th style="width: 40px;">#</th>
                                            ${page.columns.map(col => `
                                                <th id="col-${col.id}">
                                                    <div class="col-header">
                                                        <span>${FIELD_TYPES[col.type]?.icon || '•'}</span>
                                                        <span>${col.name}</span>
                                                        <span class="col-menu" onclick="cms.showColMenu('${this.currentPage}', '${col.id}', event)">⋮</span>
                                                    </div>
                                                </th>
                                            `).join('')}
                                            <th style="width: 40px;"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${page.rows.map((row, idx) => `
                                            <tr>
                                                <td style="width: 40px; text-align: center; color: var(--text-secondary);">${idx + 1}</td>
                                                ${page.columns.map(col => `
                                                    <td data-row-id="${row.id}" data-col-id="${col.id}" onclick="cms.openCell('${this.currentPage}', '${row.id}', '${col.id}')">
                                                        ${(row.cells[col.id] || '').substring(0, 50)}
                                                    </td>
                                                `).join('')}
                                                <td style="width: 40px; text-align: center;">
                                                    <button class="btn" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 16px;" onclick="cms.deleteRow('${this.currentPage}', '${row.id}')">✕</button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        ${this.expandedCell ? this.renderPanel() : ''}
                    </div>
                `;
            }

            renderPanel() {
                const page = this.pages[this.currentPage];
                const row = page.rows.find(r => r.id === this.expandedCell.rowId);
                const column = page.columns.find(c => c.id === this.expandedCell.colId);
                
                if (!row || !column) return '';

                let fieldHtml = '';
                
                if (column.type === 'text-short') {
                    fieldHtml = `<input type="text" id="cellValue" value="${row.cells[column.id] || ''}" placeholder="Enter text">`;
                } else if (column.type === 'text-long') {
                    fieldHtml = `<textarea id="cellValue" placeholder="Enter text">${row.cells[column.id] || ''}</textarea>`;
                } else if (column.type === 'select-single') {
                    const options = column.options || [];
                    fieldHtml = `
                        <select id="cellValue">
                            <option value="">Select...</option>
                            ${options.map(opt => `
                                <option value="${opt}" ${row.cells[column.id] === opt ? 'selected' : ''}>${opt}</option>
                            `).join('')}
                        </select>
                    `;
                } else if (column.type === 'date') {
                    fieldHtml = `<input type="date" id="cellValue" value="${row.cells[column.id] || ''}">`;
                } else if (column.type === 'number') {
                    fieldHtml = `<input type="number" id="cellValue" value="${row.cells[column.id] || ''}" placeholder="Enter number">`;
                } else if (column.type === 'ai-field') {
                    fieldHtml = `
                        <div class="ai-section">
                            ${row.cells[column.id] ? `
                                <div class="ai-result">${row.cells[column.id]}</div>
                            ` : ''}
                            <div class="form-group">
                                <label>Provider</label>
                                <select id="aiProvider">
                                    ${Object.keys(AI_MODELS).map(p => `
                                        <option value="${p}">${p.charAt(0).toUpperCase() + p.slice(1)}</option>
                                    `).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Model</label>
                                <select id="aiModel">
                                    ${AI_MODELS.anthropic.map(m => `
                                        <option value="${m.id}">${m.label}</option>
                                    `).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Prompt</label>
                                <textarea id="aiPrompt" placeholder="Write your prompt..."></textarea>
                            </div>
                            <button class="btn btn-primary" id="generateBtn" style="width: 100%;">✨ Generate</button>
                        </div>
                    `;
                }

                return `
                    <div class="panel">
                        <div class="panel-header">
                            <h3>${column.name}</h3>
                            <button class="close-btn" id="closePanelBtn">✕</button>
                        </div>

                        <div class="panel-content">
                            <div class="field">
                                <div class="field-label">${FIELD_TYPES[column.type]?.label}</div>
                                ${fieldHtml}
                            </div>
                        </div>

                        <div class="panel-footer">
                            <button class="btn btn-primary" id="saveCellBtn">Save</button>
                            <button class="btn" id="cancelCellBtn">Cancel</button>
                        </div>
                    </div>
                `;
            }

            showColMenu(pageName, colId, event) {
                event.stopPropagation();
                const existing = document.querySelector('.col-menu-dropdown');
                if (existing) existing.remove();

                const menu = document.createElement('div');
                menu.className = 'col-menu-dropdown';
                menu.innerHTML = `
                    <button onclick="cms.editColumnName('${pageName}', '${colId}')">Rename</button>
                    <button onclick="cms.deleteColumn('${pageName}', '${colId}')">Delete</button>
                `;
                event.target.appendChild(menu);
            }

            editColumnName(pageName, colId) {
                const col = this.pages[pageName].columns.find(c => c.id === colId);
                const newName = prompt('New column name:', col.name);
                if (newName) {
                    col.name = newName;
                    this.savePagesData();
                    this.render();
                }
            }

            openCell(pageName, rowId, colId) {
                this.expandedCell = { pageName, rowId, colId };
                this.render();
            }

            attachLoginHandlers() {
                const form = document.getElementById('loginForm');
                const showApiKeys = document.getElementById('showApiKeys');
                const apiKeysSection = document.getElementById('apiKeysSection');

                showApiKeys.addEventListener('change', () => {
                    apiKeysSection.style.display = showApiKeys.checked ? 'block' : 'none';
                });

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const name = document.getElementById('name').value;
                    const apiKeys = {};

                    document.querySelectorAll('.api-key-input').forEach(input => {
                        const provider = input.dataset.provider;
                        apiKeys[provider] = input.value;
                    });

                    this.handleLogin(email, name, apiKeys);
                });
            }

            attachAppHandlers() {
                if (this.error) {
                    document.querySelector('.error-banner .close-btn')?.addEventListener('click', () => {
                        this.error = null;
                        this.render();
                    });
                }

                document.querySelectorAll('.page-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.currentPage = btn.dataset.page;
                        this.expandedCell = null;
                        this.render();
                    });
                });

                document.getElementById('addColBtn').addEventListener('click', () => {
                    const name = prompt('Column name:');
                    if (!name) return;

                    let typeChoice = prompt('Field type:\n1. Short Text\n2. Long Text\n3. Select\n4. Date\n5. Number\n6. AI Field\n\nEnter number (1-6):');
                    const typeMap = {
                        '1': 'text-short',
                        '2': 'text-long',
                        '3': 'select-single',
                        '4': 'date',
                        '5': 'number',
                        '6': 'ai-field'
                    };

                    const fieldType = typeMap[typeChoice] || 'text-short';
                    this.addColumn(this.currentPage, name, fieldType);
                });

                document.getElementById('addRowBtn').addEventListener('click', () => {
                    this.addRow(this.currentPage);
                });

                document.getElementById('exportBtn').addEventListener('click', () => {
                    const page = this.pages[this.currentPage];
                    let content = '| ' + page.columns.map(c => c.name).join(' | ') + ' |\n';
                    content += '| ' + page.columns.map(() => '---').join(' | ') + ' |\n';
                    
                    page.rows.forEach(row => {
                        content += '| ' + page.columns.map(c => (row.cells[c.id] || '').replace(/\|/g, '\\|')).join(' | ') + ' |\n';
                    });

                    const blob = new Blob([content], { type: 'text/markdown' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `export-${this.currentPage}-${Date.now()}.md`;
                    a.click();
                    URL.revokeObjectURL(url);
                });

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    this.logoutSession();
                    this.render();
                });

                if (this.expandedCell) {
                    document.getElementById('closePanelBtn')?.addEventListener('click', () => {
                        this.expandedCell = null;
                        this.render();
                    });

                    document.getElementById('saveCellBtn')?.addEventListener('click', () => {
                        const value = document.getElementById('cellValue')?.value || '';
                        this.updateCell(this.expandedCell.pageName, this.expandedCell.rowId, this.expandedCell.colId, value);
                        this.expandedCell = null;
                        this.render();
                    });

                    document.getElementById('cancelCellBtn')?.addEventListener('click', () => {
                        this.expandedCell = null;
                        this.render();
                    });

                    document.getElementById('generateBtn')?.addEventListener('click', async () => {
                        const provider = document.getElementById('aiProvider').value;
                        const prompt = document.getElementById('aiPrompt').value;
                        const btn = document.getElementById('generateBtn');
                        
                        if (!prompt.trim()) {
                            alert('Please enter a prompt');
                            return;
                        }

                        btn.disabled = true;
                        btn.innerHTML = '<span class="spin">⟳</span> Generating...';

                        try {
                            const response = await fetch('/.netlify/functions/ai-proxy', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    provider,
                                    model: document.getElementById('aiModel').value,
                                    prompt,
                                    apiKey: this.user.apiKeys[provider]
                                })
                            });

                            if (response.ok) {
                                const data = await response.json();
                                const resultDiv = document.createElement('div');
                                resultDiv.className = 'ai-result';
                                resultDiv.textContent = data.content;
                                btn.parentElement.insertBefore(resultDiv, btn);
                                btn.style.display = 'none';
                            } else {
                                alert('Generation failed');
                                btn.disabled = false;
                                btn.innerHTML = '✨ Generate';
                            }
                        } catch (err) {
                            alert('Error: ' + err.message);
                            btn.disabled = false;
                            btn.innerHTML = '✨ Generate';
                        }
                    });

                    document.getElementById('aiProvider')?.addEventListener('change', (e) => {
                        const provider = e.target.value;
                        const modelSelect = document.getElementById('aiModel');
                        modelSelect.innerHTML = AI_MODELS[provider].map(m => 
                            `<option value="${m.id}">${m.label}</option>`
                        ).join('');
                    });
                }
            }
        }

        const cms = new CMS();
    </script>
</body>
</html>
